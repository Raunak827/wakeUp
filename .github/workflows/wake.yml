name: Wake Streamlit App

on:
  schedule:
    # Runs at minute 0 past every 4th hour.
    - cron: "0 */4 * * *"
  
  # This allows you to manually trigger the workflow from the GitHub Actions tab
  workflow_dispatch: 

jobs:
  wake-up:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10' # You can adjust this to match your environment

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run Selenium Script
        run: python wake_app.py